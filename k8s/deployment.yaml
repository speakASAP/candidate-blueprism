apiVersion: apps/v1
kind: Deployment
metadata:
  name: candidate-blueprism
  namespace: statex-apps
  labels:
    app: candidate-blueprism
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: candidate-blueprism
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: candidate-blueprism
    spec:
      containers:
        - name: app
          image: localhost:5000/candidate-blueprism:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: candidate-blueprism-config
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
